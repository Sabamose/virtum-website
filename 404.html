<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Страница не найдена — Виртум</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#040D1C">
<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;800;900&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#040D1C;color:#EDF4FA;font-family:'Space Grotesk',sans-serif;
    text-align:center;padding:24px;overflow:hidden;position:relative}
  .glow{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 50% 50% at 50% 40%,rgba(0,200,212,.12),transparent 70%)}
  .wrap{position:relative;z-index:1;max-width:440px}
  img{width:48px;height:auto;margin:0 auto 28px}
  .code{font-family:'Exo 2',sans-serif;font-weight:900;font-size:96px;
    letter-spacing:-.03em;line-height:1;color:#EDF4FA}
  .code em{font-style:normal;color:#00C8D4}
  h1{font-family:'Exo 2',sans-serif;font-weight:800;font-size:22px;margin:18px 0 10px;letter-spacing:-.01em}
  p{font-size:15px;color:rgba(237,244,250,.5);line-height:1.6;margin-bottom:32px}
  a{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;background:#00C8D4;
    color:#040D1C;font-family:'Exo 2',sans-serif;font-weight:700;font-size:14px;
    letter-spacing:.06em;border-radius:9px;text-decoration:none;transition:all .18s}
  a:hover{background:#00B8C4;box-shadow:0 8px 24px rgba(0,200,212,.22);transform:translateY(-1px)}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <img src="/assets/logo.svg" alt="Виртум">
    <div class="code">4<em>0</em>4</div>
    <h1>Страница не найдена</h1>
    <p>Похоже, этой страницы не существует. Но ваш агент уже знает, куда вас вернуть.</p>
    <a href="/">На главную
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7h9M8.5 4l3 3-3 3" stroke="#040D1C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</body>
</html>
